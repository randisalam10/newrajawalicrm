version: '3.8'
services:
  app:
    build: .
    container_name: rajawali-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Remember to adjust these based on your server needs
      - DATABASE_URL=postgresql://admin:password123@db:5432/rajawali_db?schema=public
      - NEXTAUTH_SECRET=supersecretbase64stringforauth1q2w3e4r5t6y7u8i9o0p
      - NEXTAUTH_URL=http://localhost:3000
    volumes:
      # Map the host's ./uploads to /app/uploads inside the container for persistent storage
      - ./uploads:/app/uploads
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: rajawali-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: rajawali_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
