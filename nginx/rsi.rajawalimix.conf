server {
    listen 80;
    server_name rsi.rajawalimix.com www.rsi.rajawalimix.com;

    # Redirect ke HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name rsi.rajawalimix.com www.rsi.rajawalimix.com;

    # ── Path ke direktori public CI4 ──
    # UBAH path ini agar mengarah ke folder "public" di dalam project CI4 Anda
    root /var/www/rsi/public;
    index index.php index.html index.htm;

    # ── SSL Certificates ──
    ssl_certificate     /etc/letsencrypt/live/rsi.rajawalimix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rsi.rajawalimix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logging ──
    access_log /var/log/nginx/rsi_access.log;
    error_log /var/log/nginx/rsi_error.log;

    # ── Aturan URL CodeIgniter 4 ──
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # ── Menangani file PHP lewat PHP-FPM ──
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        
        # PENTING: Ubah versi PHP (php8.1 / php8.2 / php7.4) sesuai yang berjalan di server Anda!
        # Jika salah versi atau PHP-FPM mati, Nginx akan menampilkan 502 Bad Gateway
        fastcgi_pass unix:/var/run/php/php7.4-fpm.sock; 
        # fastcgi_pass 127.0.0.1:9000; # (Gunakan ini jika Anda memakai format port IP)
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Blok file tersembunyi (misal .env)
    location ~ /\. {
        deny all;
    }
}
