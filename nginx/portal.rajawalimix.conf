server {
    listen 80;
    server_name portal.rajawalimix.com www.portal.rajawalimix.com;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.rajawalimix.com www.portal.rajawalimix.com;

    # ── SSL Certificates (via Certbot/Let's Encrypt) ──
    ssl_certificate     /etc/letsencrypt/live/portal.rajawalimix.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.rajawalimix.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # ── Upload size limit (untuk form input) ──
    client_max_body_size 10M;

    # ── Proxy ke Next.js Docker container ──
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 60s;
    }

    # ── Next.js static files (cache agresif) ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000/_next/static/;
        expires    365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Health check endpoint ──
    location /api/health {
        proxy_pass http://127.0.0.1:3000/api/health;
        access_log off;
    }
}
